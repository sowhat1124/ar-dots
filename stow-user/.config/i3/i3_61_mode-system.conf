# 定義登出模式
set $mode_system Exit i3-wm? (y)yes / (n)cancel
mode "$mode_system" {
    bindsym y exec i3-msg exit
    bindsym n mode "default"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

