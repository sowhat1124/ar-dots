# Start i3bar to display a workspace bar (plus the system information i3status
# finds out, if available)
# 1. 匯入 pywal 生成的 Sway 變數
include ~/.cache/wal/colors-sway

# ... 其他設定 ...

bar {
    # 設定觸發按鍵（預設為你的 $mod 鍵）
    #modifier $mod
    modifier none

    #mode hide
    position top
    status_command i3blocks
    tray_output *
    tray_padding 2
    height 25
    colors {
        # 使用 pywal 定義的變數
        # $background, $foreground, $color0...$color15 是 colors-sway 提供的
        
        statusline $foreground
        background $background
        
        # 格式：<邊框> <背景> <文字>
        focused_workspace  $color13 $color13 $background
        active_workspace   $color8 $color8 $foreground
        inactive_workspace $background $background $color8
        urgent_workspace   $color9 $color9 $foreground
    }
}
