# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 2
  gaps_in = 8
  gaps_out = 10
  
  col.active_border = $color1 
  col.inactive_border = $color0
}

decoration {
  rounding = 12
         
  active_opacity = 1.0
  inactive_opacity = 1
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.05
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    color =  $color1
    color_inactive = $color0
  }


  blur {
    enabled = true	
    size = 7
    passes = 3
    ignore_opacity = true
    noise = 0.15
    contrast = 1.5
    xray = false
    new_optimizations = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
